name: campus_canteen
description: A Flutter app for Campus Canteen food ordering system
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.1.4
  
  # HTTP requests (keeping for backward compatibility)
  http: ^1.1.0
  
  # Local storage for JWT tokens
  shared_preferences: ^2.2.2
  
  # UI
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
